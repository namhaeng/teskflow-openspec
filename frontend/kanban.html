<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - 칸반</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3.4.31/dist/vue.global.prod.js"></script>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">
  <div id="app" class="contents"></div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/components.js"></script>
  <script>
    const { createApp } = Vue;
    const COLUMNS = [
      { key: "TODO", label: "TODO", color: "bg-yellow-50 border-yellow-300" },
      { key: "DOING", label: "DOING", color: "bg-blue-50 border-blue-300" },
      { key: "DONE", label: "DONE", color: "bg-green-50 border-green-300" },
    ];

    createApp({
      components: { TeamSidebar, TopNav, AddTeamModal },
      data() {
        return {
          teamId: requireTeam(),
          team: null,
          hasNoTeams: false,
          members: [],
          tasks: [],
          currentFilter: "all",
          mobileCol: "TODO",
          showAddModal: false,
          editingTask: null,
          editTitle: "",
          editStatus: "",
          editAssignee: "",
          showConfirmDelete: false,
          inlineAddCol: null,
          inlineTitle: "",
          inlineAssignee: "",
          columns: COLUMNS,
        };
      },
      async mounted() {
        if (!this.teamId) {
          const myTeams = await Api.listMyTeams().catch(() => []);
          if (myTeams.length > 0) {
            location.href = `/kanban.html?team=${myTeams[0].id}`;
            return;
          }
          this.hasNoTeams = true;
          return;
        }
        this.team = await Api.getTeam(this.teamId);
        this.members = await Api.getMembers(this.teamId);
        await this.loadTasks();
      },
      methods: {
        async loadTasks() {
          this.tasks = await Api.listTasks(this.teamId, this.currentFilter);
        },
        async setFilter(f) {
          this.currentFilter = f;
          await this.loadTasks();
        },
        tasksFor(colKey) {
          return this.tasks.filter((t) => t.status === colKey);
        },
        assigneeLabel(t) {
          if (!t.assignee_id) return null;
          const m = this.members.find((x) => x.id === t.assignee_id);
          return m ? m.email.split("@")[0] : "?";
        },
        onDragStart(e, taskId) {
          e.dataTransfer.setData("text/plain", taskId);
        },
        async onDrop(e, status) {
          const id = Number(e.dataTransfer.getData("text/plain"));
          try {
            await Api.updateTaskStatus(id, status);
            await this.loadTasks();
          } catch (err) {
            alert(err.message);
          }
        },
        openStatusMenu(taskId) {
          const next = prompt("상태 변경: TODO / DOING / DONE");
          if (next && ["TODO", "DOING", "DONE"].includes(next.toUpperCase())) {
            Api.updateTaskStatus(taskId, next.toUpperCase()).then(() => this.loadTasks()).catch((err) => alert(err.message));
          }
        },
        openInlineAdd(colKey) {
          this.inlineAddCol = colKey;
          this.inlineTitle = "";
          this.inlineAssignee = "";
          this.$nextTick(() => {
            const el = this.$refs.inlineInput;
            if (el) (Array.isArray(el) ? el[0] : el).focus();
          });
        },
        cancelInlineAdd() {
          this.inlineAddCol = null;
        },
        async submitInlineAdd() {
          if (!this.inlineTitle.trim()) return;
          try {
            await Api.createTask(this.teamId, this.inlineTitle.trim(), this.inlineAssignee ? Number(this.inlineAssignee) : null);
            this.inlineAddCol = null;
            await this.loadTasks();
          } catch (err) {
            alert(err.message);
          }
        },
        openTaskModal(task) {
          this.editingTask = task;
          this.editTitle = task.title;
          this.editStatus = task.status;
          this.editAssignee = task.assignee_id || "";
        },
        closeTaskModal() {
          this.editingTask = null;
        },
        async saveTaskModal() {
          try {
            await Api.updateTaskTitle(this.editingTask.id, this.editTitle.trim(), this.editAssignee ? Number(this.editAssignee) : null);
            await Api.updateTaskStatus(this.editingTask.id, this.editStatus);
            this.editingTask = null;
            await this.loadTasks();
          } catch (err) {
            alert(err.message);
          }
        },
        async confirmDelete() {
          try {
            await Api.deleteTask(this.editingTask.id);
            this.showConfirmDelete = false;
            this.editingTask = null;
            await this.loadTasks();
          } catch (err) {
            alert(err.message);
          }
        },
        copyInviteCode() {
          navigator.clipboard.writeText(this.team.invite_code);
        },
        formatJoinDate(iso) {
          return new Date(iso).toLocaleDateString("ko-KR");
        },
        async leaveTeam() {
          if (!confirm("정말 이 과제를 나가시겠습니까?")) return;
          try {
            await Api.leaveTeam(this.teamId);
            location.href = "/kanban.html";
          } catch (err) {
            alert(err.message);
          }
        },
      },
      template: `
        <template v-if="hasNoTeams">
          <div class="flex-1 flex flex-col">
            <header class="shrink-0 bg-white border-b px-4 py-3 flex justify-between items-center">
              <span class="font-bold text-teal-700">TaskFlow</span>
              <button class="text-teal-600 underline text-sm" @click="() => { clearToken(); location.href='/index.html'; }">로그아웃</button>
            </header>
            <main class="flex-1 flex flex-col items-center justify-center text-center">
              <div class="text-4xl mb-3">📋</div>
              <p class="font-bold mb-1">아직 참여 중인 과제가 없습니다</p>
              <p class="text-sm text-gray-500 mb-4">새 과제를 만들거나 초대코드로 합류해보세요</p>
              <button class="bg-teal-700 text-white rounded px-4 py-2 font-medium" @click="showAddModal = true">+ 새 과제 추가</button>
            </main>
          </div>
          <add-team-modal v-if="showAddModal" @close="showAddModal = false" @created="showAddModal = true" />
        </template>

        <template v-else-if="team">
          <team-sidebar page-type="kanban" :active-team-id="teamId" @add="showAddModal = true" />

          <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
            <top-nav active="kanban" :team-name="team.name" :team-id="teamId" />

            <div class="flex-1 min-h-0 flex overflow-hidden">
              <main class="flex-1 min-h-0 min-w-0 p-4 flex flex-col overflow-hidden">
                <div class="shrink-0 flex flex-wrap gap-2 justify-between items-center mb-4">
                  <div class="flex gap-2">
                    <button class="px-3 py-1.5 rounded text-sm" :class="currentFilter === 'all' ? 'bg-gray-800 text-white' : 'bg-gray-200'" @click="setFilter('all')">전체</button>
                    <button class="px-3 py-1.5 rounded text-sm" :class="currentFilter === 'me' ? 'bg-gray-800 text-white' : 'bg-gray-200'" @click="setFilter('me')">@me</button>
                    <button class="px-3 py-1.5 rounded text-sm" :class="currentFilter === 'unassigned' ? 'bg-gray-800 text-white' : 'bg-gray-200'" @click="setFilter('unassigned')">미할당</button>
                  </div>
                </div>

                <div class="shrink-0 flex md:hidden gap-2 mb-3 text-sm font-medium">
                  <button v-for="c in columns" :key="c.key" class="flex-1 py-2 border-b-2"
                          :class="mobileCol === c.key ? 'border-teal-700 text-teal-700' : 'border-transparent'"
                          @click="mobileCol = c.key">{{ c.label }}</button>
                </div>

                <div class="flex-1 min-h-0 grid md:grid-cols-3 gap-4">
                  <div v-for="col in columns" :key="col.key"
                       class="flex-col h-full min-h-0 border rounded"
                       :class="[col.color, (col.key === mobileCol ? 'flex' : 'hidden md:flex')]"
                       @dragover.prevent
                       @drop="onDrop($event, col.key)">
                    <div class="shrink-0 flex justify-between items-center px-3 py-2 font-bold">
                      <span>{{ col.label }} · {{ tasksFor(col.key).length }}</span>
                      <button class="text-lg" @click="openInlineAdd(col.key)">+</button>
                    </div>
                    <div class="flex-1 min-h-0 overflow-y-auto p-2 space-y-2">
                      <div v-if="inlineAddCol === col.key" class="bg-white border-2 border-teal-600 rounded p-2 space-y-1">
                        <input ref="inlineInput" v-model="inlineTitle" @keydown.enter="submitInlineAdd" @keydown.esc="cancelInlineAdd"
                               class="w-full border-b px-1 py-1 text-sm" placeholder="태스크 제목" />
                        <select v-model="inlineAssignee" class="w-full border rounded px-1 py-1 text-sm">
                          <option value="">담당자: 미할당</option>
                          <option v-for="m in members" :key="m.id" :value="m.id">담당자: {{ m.email }}</option>
                        </select>
                        <div class="text-xs text-gray-400">Enter: 저장 · Esc: 취소</div>
                      </div>

                      <template v-if="tasksFor(col.key).length === 0 && inlineAddCol !== col.key">
                        <div class="border-2 border-dashed rounded p-6 text-center text-gray-400 text-sm">
                          📋<br>카드 없음<br>
                          <button v-if="col.key === 'TODO'" class="text-teal-700 underline mt-1" @click="openInlineAdd('TODO')">+ 첫 태스크 만들기</button>
                          <template v-else>드래그로 이동</template>
                        </div>
                      </template>

                      <div v-for="t in tasksFor(col.key)" :key="t.id"
                           class="bg-white border rounded p-3 cursor-pointer shadow-sm"
                           draggable="true"
                           @dragstart="onDragStart($event, t.id)"
                           @click="openTaskModal(t)"
                           @touchstart="openStatusMenu(t.id)">
                        <div class="font-medium text-sm">{{ t.title }}</div>
                        <div class="text-xs text-gray-500 mt-1">
                          #{{ t.id }} ·
                          <span v-if="assigneeLabel(t)">@{{ assigneeLabel(t) }}</span>
                          <span v-else class="text-amber-600">⚠ 미할당</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </main>

              <aside class="hidden lg:flex flex-col h-full w-72 shrink-0 border-l bg-white overflow-y-auto">
                <div class="p-4 border-b">
                  <a :href="'/chat.html?team=' + teamId" class="w-full flex items-center justify-center gap-1.5 bg-teal-700 text-white rounded py-2 text-sm font-medium mb-3">💬 채팅</a>
                  <div class="flex justify-between items-center mb-2">
                    <h2 class="font-bold text-sm text-gray-500">과제 멤버 ({{ members.length }})</h2>
                    <button v-if="team.role !== 'owner'" class="text-xs text-red-600 underline" @click="leaveTeam">나가기</button>
                  </div>
                  <div v-if="team.role === 'owner'" class="bg-gray-50 border rounded p-3 text-sm">
                    <div class="text-xs text-gray-500 mb-1">초대코드</div>
                    <div class="flex items-center gap-2">
                      <div class="flex-1 border border-teal-600 rounded px-2 py-1 text-center font-mono tracking-wider">{{ team.invite_code }}</div>
                      <button class="text-xs border rounded px-2 py-1" @click="copyInviteCode">복사</button>
                    </div>
                  </div>
                </div>
                <div class="flex-1 overflow-y-auto divide-y">
                  <div v-for="m in members" :key="m.id" class="flex items-center gap-2 p-3">
                    <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-xs font-bold shrink-0">{{ m.email[0].toUpperCase() }}</div>
                    <div class="flex-1 min-w-0">
                      <div class="text-sm truncate">{{ m.email }}</div>
                      <div class="text-xs text-gray-500">{{ m.role === 'owner' ? '★ owner' : 'member' }} · {{ formatJoinDate(m.created_at) }}</div>
                    </div>
                  </div>
                </div>
              </aside>
            </div>
          </div>

          <div v-if="editingTask" class="fixed inset-0 bg-black/40 flex items-center justify-center z-40">
            <div class="bg-white rounded-lg w-full max-w-md p-5">
              <div class="flex justify-between items-start mb-4">
                <h3 class="font-bold">#{{ editingTask.id }} {{ editingTask.title }}</h3>
                <button class="text-gray-400 text-xl leading-none" @click="closeTaskModal">&times;</button>
              </div>
              <label class="text-sm text-gray-600">제목</label>
              <input v-model="editTitle" class="w-full border rounded px-3 py-2 mb-3" />
              <label class="text-sm text-gray-600">상태</label>
              <div class="flex gap-2 mb-3">
                <button v-for="s in ['TODO','DOING','DONE']" :key="s"
                        class="flex-1 border rounded py-1.5"
                        :class="editStatus === s ? 'bg-teal-700 text-white' : ''"
                        @click="editStatus = s">{{ s }}</button>
              </div>
              <label class="text-sm text-gray-600">담당자</label>
              <select v-model="editAssignee" class="w-full border rounded px-3 py-2 mb-4">
                <option value="">미할당</option>
                <option v-for="m in members" :key="m.id" :value="m.id">{{ m.email }}{{ m.role === 'owner' ? ' (owner)' : '' }}</option>
              </select>
              <div class="flex gap-2">
                <button class="flex-1 bg-teal-700 text-white rounded py-2 font-medium" @click="saveTaskModal">저장</button>
                <button class="flex-1 border border-red-400 text-red-600 rounded py-2 font-medium" @click="showConfirmDelete = true">🗑 삭제</button>
              </div>
            </div>
          </div>

          <div v-if="showConfirmDelete" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg w-full max-w-sm p-5 text-center">
              <div class="text-3xl mb-2">⚠️</div>
              <p class="font-bold mb-1">이 카드를 삭제하시겠습니까?</p>
              <p class="text-sm text-gray-500 mb-4">'#{{ editingTask.id }} {{ editingTask.title }}' — 되돌릴 수 없습니다</p>
              <div class="flex gap-2">
                <button class="flex-1 border rounded py-2" @click="showConfirmDelete = false">취소</button>
                <button class="flex-1 bg-red-600 text-white rounded py-2" @click="confirmDelete">삭제</button>
              </div>
            </div>
          </div>

          <button class="md:hidden fixed bottom-6 right-6 w-14 h-14 rounded-full bg-teal-700 text-white text-2xl shadow-lg" @click="openInlineAdd(mobileCol)">+</button>

          <add-team-modal v-if="showAddModal" @close="showAddModal = false" @created="showAddModal = true" />
        </template>
      `,
    }).mount("#app");
  </script>
</body>
</html>
