<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - 팀 선택</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b px-4 py-3 flex justify-between items-center">
    <span class="font-bold text-teal-700">TaskFlow</span>
    <div class="flex items-center gap-3 text-sm text-gray-600">
      <span id="user-email"></span>
      <button id="logout-btn" class="text-teal-600 underline">로그아웃</button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-6">
    <div id="select-view">
      <div class="bg-blue-50 border border-blue-200 text-blue-800 rounded p-3 mb-6 text-sm">
        아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div class="border rounded p-4">
          <h2 class="font-bold mb-3">+ 새 팀 만들기</h2>
          <form id="create-form" class="space-y-2">
            <input id="team-name" placeholder="팀 이름 (1-30자)" maxlength="30" required class="w-full border rounded px-3 py-2" />
            <p id="create-error" class="text-red-600 text-sm hidden"></p>
            <button type="submit" class="w-full bg-teal-700 text-white rounded py-2 font-medium">만들기</button>
          </form>
        </div>

        <div class="border rounded p-4">
          <h2 class="font-bold mb-3">초대코드로 합류</h2>
          <form id="join-form" class="space-y-2">
            <input id="invite-code" placeholder="ABCD-1234" required class="w-full border rounded px-3 py-2 uppercase" />
            <p class="text-xs text-gray-500">형식: 대문자 4 + 숫자 4 (하이픈 포함)</p>
            <div id="team-preview" class="hidden bg-gray-50 border rounded p-3 text-sm">
              <div class="font-bold" id="preview-name"></div>
              <div class="text-gray-500 text-xs mt-0.5">멤버 <span id="preview-member-count"></span>명 · owner: <span id="preview-owner"></span></div>
            </div>
            <p id="join-error" class="text-red-600 text-sm hidden"></p>
            <button type="submit" class="w-full bg-emerald-600 text-white rounded py-2 font-medium">합류</button>
          </form>
        </div>
      </div>
    </div>

    <div id="created-view" class="hidden border rounded p-6">
      <div class="bg-green-50 border border-green-200 text-green-800 rounded p-3 mb-4 text-sm">
        ✓ 팀이 생성되었습니다!
      </div>
      <div class="text-sm text-gray-500 mb-1">팀 이름</div>
      <div class="font-bold text-lg mb-4" id="created-team-name"></div>
      <div class="text-sm text-gray-500 mb-1">초대코드 (멤버에게 공유)</div>
      <div class="flex items-center gap-2 mb-6">
        <div class="flex-1 border-2 border-teal-600 rounded px-3 py-2 text-center font-mono text-xl tracking-wider" id="created-invite-code"></div>
        <button id="copy-btn" class="border rounded px-3 py-2 text-sm">📋 복사</button>
      </div>
      <button id="go-kanban-btn" class="w-full bg-teal-700 text-white rounded py-2 font-medium">칸반 시작하기 →</button>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    if (!getToken()) location.href = "/index.html";

    Api.me().then((u) => {
      document.getElementById("user-email").textContent = u.email;
      if (u.team_id) location.href = `/kanban.html?team=${u.team_id}`;
    }).catch(() => { location.href = "/index.html"; });

    document.getElementById("logout-btn").addEventListener("click", async () => {
      try { await Api.logout(); } catch (e) {}
      clearToken();
      location.href = "/index.html";
    });

    document.getElementById("create-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById("create-error");
      errorEl.classList.add("hidden");
      try {
        const name = document.getElementById("team-name").value;
        const team = await Api.createTeam(name);
        document.getElementById("select-view").classList.add("hidden");
        document.getElementById("created-view").classList.remove("hidden");
        document.getElementById("created-team-name").textContent = team.name;
        document.getElementById("created-invite-code").textContent = team.invite_code;
        document.getElementById("copy-btn").onclick = () => navigator.clipboard.writeText(team.invite_code);
        document.getElementById("go-kanban-btn").onclick = () => { location.href = `/kanban.html?team=${team.id}`; };
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("hidden");
      }
    });

    const inviteInput = document.getElementById("invite-code");
    const previewEl = document.getElementById("team-preview");
    let previewTimer = null;

    inviteInput.addEventListener("input", () => {
      clearTimeout(previewTimer);
      const code = inviteInput.value.trim().toUpperCase();
      if (!/^[A-Z]{4}-[0-9]{4}$/.test(code)) {
        previewEl.classList.add("hidden");
        return;
      }
      previewTimer = setTimeout(async () => {
        try {
          const preview = await Api.previewTeam(code);
          document.getElementById("preview-name").textContent = preview.name;
          document.getElementById("preview-member-count").textContent = preview.member_count;
          document.getElementById("preview-owner").textContent = preview.owner_email;
          previewEl.classList.remove("hidden");
        } catch (err) {
          previewEl.classList.add("hidden");
        }
      }, 300);
    });

    document.getElementById("join-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById("join-error");
      errorEl.classList.add("hidden");
      try {
        const code = document.getElementById("invite-code").value.trim().toUpperCase();
        const team = await Api.joinTeam(code);
        location.href = `/kanban.html?team=${team.id}`;
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
