<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - 채팅</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3.4.31/dist/vue.global.prod.js"></script>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">
  <div id="app" class="contents"></div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/components.js"></script>
  <script>
    const { createApp } = Vue;
    const MAX_LEN = 1000;

    createApp({
      components: { TeamSidebar, TopNav, AddTeamModal },
      data() {
        return {
          teamId: requireTeam(),
          team: null,
          messages: [],
          content: "",
          currentUserId: null,
          lastSince: null,
          pollOk: true,
          pollTimer: null,
          showAddModal: false,
        };
      },
      computed: {
        overLimit() {
          return this.content.length > MAX_LEN;
        },
      },
      async mounted() {
        if (!this.teamId) {
          location.href = "/kanban.html";
          return;
        }
        this.team = await Api.getTeam(this.teamId);
        const me = await Api.me();
        this.currentUserId = me.id;
        await this.loadInitial();
        this.pollTimer = setInterval(() => this.poll(), 5000);
      },
      beforeUnmount() {
        clearInterval(this.pollTimer);
      },
      methods: {
        formatTime(iso) {
          return new Date(iso).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
        },
        async loadInitial() {
          const list = await Api.listMessages(this.teamId);
          this.messages = list;
          this.lastSince = list.length ? list[list.length - 1].created_at : null;
          this.scrollToBottom();
        },
        async poll() {
          try {
            const list = await Api.listMessages(this.teamId, this.lastSince);
            if (list.length) {
              this.messages.push(...list);
              this.lastSince = list[list.length - 1].created_at;
              this.scrollToBottom();
            }
            this.pollOk = true;
          } catch (err) {
            this.pollOk = false;
          }
        },
        scrollToBottom() {
          this.$nextTick(() => {
            const el = this.$refs.messagesEl;
            if (el) el.scrollTop = el.scrollHeight;
          });
        },
        async send() {
          const text = this.content.trim();
          if (!text || this.overLimit) return;
          try {
            await Api.sendMessage(this.teamId, text);
            this.content = "";
            await this.loadInitial();
          } catch (err) {
            alert(err.message);
          }
        },
        async deleteMessage(id) {
          try {
            await Api.deleteMessage(id);
            await this.loadInitial();
          } catch (err) {
            alert(err.message);
          }
        },
      },
      template: `
        <template v-if="team">
          <team-sidebar page-type="chat" :active-team-id="teamId" @add="showAddModal = true" />

          <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
            <top-nav active="chat" :team-name="team.name" :team-id="teamId" />

            <main class="max-w-3xl w-full mx-auto flex-1 min-h-0 flex flex-col p-4">
              <div class="shrink-0 flex justify-between items-center mb-2">
                <div class="flex items-center gap-2">
                  <a :href="'/kanban.html?team=' + teamId" class="text-sm text-teal-700 underline">← 칸반</a>
                  <h1 class="font-bold">{{ team.name }} · 채팅</h1>
                </div>
                <span class="text-xs" :class="pollOk ? 'text-green-600' : 'text-red-600'">
                  {{ pollOk ? '● 5초마다 새로고침' : '⚠ 연결 끊김 · 재시도 중' }}
                </span>
              </div>

              <div ref="messagesEl" class="flex-1 overflow-y-auto border rounded bg-white p-4 space-y-3 min-h-[300px]">
                <div v-if="messages.length === 0" class="text-center text-gray-400 py-10">
                  💬<br>아직 대화가 없습니다<br>
                  <span class="text-sm">첫 메시지를 보내 과제 멤버와 대화를 시작하세요</span>
                </div>
                <div v-for="m in messages" :key="m.id" class="group flex" :class="m.user_id === currentUserId ? 'justify-end' : 'justify-start'">
                  <div class="max-w-[70%]">
                    <div class="text-xs text-gray-400 mb-0.5" :class="m.user_id === currentUserId ? 'text-right' : ''">
                      {{ m.user_email.split('@')[0] }} · {{ formatTime(m.created_at) }}
                    </div>
                    <div class="flex items-center gap-1" :class="m.user_id === currentUserId ? 'flex-row-reverse' : ''">
                      <div class="rounded px-3 py-2 text-sm" :class="m.user_id === currentUserId ? 'bg-teal-700 text-white' : 'bg-gray-100'">{{ m.content }}</div>
                      <button v-if="m.user_id === currentUserId" class="opacity-0 group-hover:opacity-100 text-red-500 text-sm" @click="deleteMessage(m.id)">🗑</button>
                    </div>
                  </div>
                </div>
              </div>

              <form class="shrink-0 mt-3 flex gap-2 items-end" @submit.prevent="send">
                <div class="flex-1">
                  <textarea v-model="content" rows="1" placeholder="메시지 입력 (1000자 이내)…" class="w-full border rounded px-3 py-2"></textarea>
                  <div class="text-xs mt-1" :class="overLimit ? 'text-red-600 font-bold' : 'text-gray-400'">{{ content.length }} / 1000</div>
                </div>
                <button type="submit" :disabled="overLimit || content.length === 0" class="bg-teal-700 text-white rounded px-4 py-2 font-medium disabled:opacity-50">전송</button>
              </form>
            </main>
          </div>

          <add-team-modal v-if="showAddModal" @close="showAddModal = false" @created="showAddModal = true" />
        </template>
      `,
    }).mount("#app");
  </script>
</body>
</html>
