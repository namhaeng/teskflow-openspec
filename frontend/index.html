<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3.4.31/dist/vue.global.prod.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-fuchsia-500 via-purple-500 to-indigo-500">
  <div id="app"></div>

  <script src="/js/api.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return { email: "", password: "", error: "", loading: false };
      },
      async mounted() {
        if (getToken()) await this.redirectAfterAuth();
      },
      methods: {
        async submit() {
          this.error = "";
          this.loading = true;
          try {
            const res = await Api.login(this.email, this.password);
            setToken(res.token);
            await this.redirectAfterAuth();
          } catch (err) {
            this.error = err.message;
            this.loading = false;
          }
        },
        async redirectAfterAuth() {
          try {
            const teams = await Api.listMyTeams();
            location.href = teams.length ? `/kanban.html?team=${teams[0].id}` : "/kanban.html";
          } catch (e) {
            location.href = "/kanban.html";
          }
        },
      },
      template: `
        <div class="w-full max-w-sm bg-white/95 backdrop-blur rounded-xl shadow-2xl p-6">
          <div class="flex justify-center mb-4">
            <span class="bg-gradient-to-r from-fuchsia-500 to-indigo-500 text-white px-4 py-2 rounded-full font-bold shadow">TaskFlow</span>
          </div>
          <h1 class="text-xl font-bold text-center mb-4">로그인</h1>
          <form @submit.prevent="submit" class="space-y-3">
            <input v-model="email" type="email" required placeholder="이메일" class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-fuchsia-400" />
            <input v-model="password" type="password" required placeholder="비밀번호" class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-fuchsia-400" />
            <p v-if="error" class="text-red-600 text-sm">{{ error }}</p>
            <button type="submit" :disabled="loading" class="w-full bg-gradient-to-r from-fuchsia-500 to-indigo-500 hover:from-fuchsia-600 hover:to-indigo-600 text-white rounded py-2 font-medium shadow-md transition">
              {{ loading ? '처리 중...' : '로그인' }}
            </button>
          </form>
          <p class="text-center text-sm mt-4 text-gray-600">
            계정이 없으신가요? <a href="/signup.html" class="text-fuchsia-600 font-medium underline">회원가입</a>
          </p>
        </div>
      `,
    }).mount("#app");
  </script>
</body>
</html>
