<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - 과제 멤버</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3.4.31/dist/vue.global.prod.js"></script>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">
  <div id="app" class="contents"></div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/components.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      components: { TeamSidebar, TopNav, AddTeamModal },
      data() {
        return {
          teamId: requireTeam(),
          team: null,
          members: [],
          showAddModal: false,
        };
      },
      async mounted() {
        if (!this.teamId) {
          location.href = "/kanban.html";
          return;
        }
        this.team = await Api.getTeam(this.teamId);
        this.members = await Api.getMembers(this.teamId);
      },
      methods: {
        formatDate(iso) {
          return new Date(iso).toLocaleDateString("ko-KR");
        },
        copyInviteCode() {
          navigator.clipboard.writeText(this.team.invite_code);
        },
        async toggleActive() {
          try {
            this.team = await Api.updateTeamActive(this.teamId, !this.team.is_active);
          } catch (err) {
            alert(err.message);
          }
        },
        async leave() {
          if (!confirm("정말 이 과제를 나가시겠습니까?")) return;
          try {
            await Api.leaveTeam(this.teamId);
            location.href = "/kanban.html";
          } catch (err) {
            alert(err.message);
          }
        },
      },
      template: `
        <template v-if="team">
          <team-sidebar page-type="members" :active-team-id="teamId" @add="showAddModal = true" />

          <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
            <top-nav active="members" :team-name="team.name" :team-id="teamId" />

            <main class="max-w-2xl mx-auto p-4 w-full overflow-y-auto">
              <div class="flex justify-between items-center mb-3">
                <h1 class="font-bold">과제 멤버 ({{ members.length }})</h1>
                <div class="flex gap-2 items-center">
                  <span v-if="!team.is_active" class="text-xs border rounded px-2 py-1 text-gray-500">비활성 과제</span>
                  <button v-if="team.role === 'owner'" class="text-sm border rounded px-2 py-1" @click="toggleActive">
                    {{ team.is_active ? '과제 비활성화' : '과제 활성화' }}
                  </button>
                  <button v-else class="text-sm text-red-600 underline" @click="leave">과제 나가기</button>
                </div>
              </div>

              <div v-if="team.role === 'owner'" class="bg-white border rounded p-4 mb-4">
                <div class="text-sm text-gray-500 mb-1">초대코드 (멤버에게 공유)</div>
                <div class="flex items-center gap-2">
                  <div class="flex-1 border-2 border-teal-600 rounded px-3 py-2 text-center font-mono text-lg tracking-wider">{{ team.invite_code }}</div>
                  <button class="border rounded px-3 py-2 text-sm" @click="copyInviteCode">📋 복사</button>
                </div>
              </div>

              <div class="bg-white border rounded divide-y">
                <div v-for="m in members" :key="m.id" class="flex items-center gap-3 p-3">
                  <div class="w-9 h-9 rounded-full bg-gray-300 flex items-center justify-center font-bold">{{ m.email[0].toUpperCase() }}</div>
                  <div class="flex-1">
                    <div class="text-sm font-medium">{{ m.email }}</div>
                    <div class="text-xs text-gray-500">{{ m.role === 'owner' ? '★ owner' : 'member' }}</div>
                  </div>
                  <div class="text-xs text-gray-400">{{ formatDate(m.created_at) }}</div>
                </div>
              </div>
            </main>
          </div>

          <add-team-modal v-if="showAddModal" @close="showAddModal = false" @created="showAddModal = true" />
        </template>
      `,
    }).mount("#app");
  </script>
</body>
</html>
